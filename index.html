<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Trợ lý Chi Tiêu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c27;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --green: #3dd68c;
    --red: #ff6b6b;  
    --yellow: #ffd166;
    --text: #f0eeff;
    --text2: #9b99b8;
    --text3: #5c5a78;
    --border: rgba(124,106,255,0.15);
    --bubble-user: #7c6aff;
    --bubble-bot: #1c1c27;
    --radius: 18px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    overflow: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #b06aff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(124,106,255,0.4);
    flex-shrink: 0;
  }

  .header-text { flex: 1; }
  .header-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-status {
    font-size: 11px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-menu {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .header-menu:active { background: var(--bg3); transform: scale(0.95); }

  /* QUICK ACTIONS */
  .quick-actions {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .qa-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    font-size: 12px;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .qa-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(0.96); }

  /* CHAT AREA */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg3) transparent;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  /* DATE DIVIDER */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding: 4px 0;
    letter-spacing: 0.5px;
  }

  /* MESSAGES */
  .msg-wrap {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.bot  { align-items: flex-start; }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-wrap.user .bubble {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 4px 20px rgba(124,106,255,0.3);
  }
  .msg-wrap.bot .bubble {
    background: var(--bubble-bot);
    color: var(--text);
    border-bottom-left-radius: 5px;
    border: 1px solid var(--border);
  }

  /* Card style for bot responses with data */
  .bubble.card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 12px 14px;
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 13px;
  }
  .card-row .lbl { color: var(--text2); }
  .card-row .val { font-weight: 500; color: var(--text); }
  .card-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .card-total { display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; }
  .amount-red { color: var(--red); }
  .amount-green { color: var(--green); }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    padding: 0 4px;
  }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 5px;
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--accent2); }
  }

  /* INPUT AREA */
  .input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-box {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    line-height: 1.5;
    transition: border-color 0.2s;
    scrollbar-width: none;
  }
  .input-box::-webkit-scrollbar { display: none; }
  .input-box::placeholder { color: var(--text3); }
  .input-box:focus { border-color: rgba(124,106,255,0.5); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #b06aff);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(124,106,255,0.4);
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 2rem;
    text-align: center;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text2); }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* SUGGESTIONS */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }
  .sug-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    font-size: 12px;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .sug-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* POP-UP MODAL CỦA VÍ */
  .wallet-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(124,106,255,0.1); }
  .switch { position:relative; display:inline-block; width:44px; height:24px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#333; border: 1px solid var(--border); transition:.3s; border-radius:24px; }
  .slider:before { position:absolute; content:""; height:16px; width:16px; left:3px; bottom:3px; background-color:#aaa; transition:.3s; border-radius:50%; }
  input:checked + .slider { background-color: var(--green); border-color: var(--green); }
  input:checked + .slider:before { transform:translateX(20px); background-color: white; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-avatar">💰</div>
    <div class="header-text">
      <div class="header-name">Trợ lý Chi Tiêu</div>
      <div class="header-status">
        <div class="status-dot"></div>
        Đang hoạt động
      </div>
    </div>
    <div class="header-menu" onclick="clearChat()" title="Xóa lịch sử chat">🗑</div>
  </div>

  <div class="quick-actions">
    <button class="qa-btn" onclick="quickSend('số dư các ví')">👛 Số dư ví</button>
    <button class="qa-btn" onclick="quickSend('hôm nay tiêu bao nhiêu')">📊 Hôm nay</button>
    <button class="qa-btn" onclick="quickSend('tuần này tiêu bao nhiêu')">📅 Tuần này</button>
    <button class="qa-btn" onclick="quickSend('tháng này tiêu bao nhiêu')">🗓 Tháng này</button>
    <button class="qa-btn" onclick="quickSend('xuất báo cáo excel tháng này')">📁 Xuất Excel</button>
    <button class="qa-btn" onclick="quickSend('cài đặt ví')">⚙️ Cài đặt ví</button>
  </div>

  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Xin chào! Mình là trợ lý chi tiêu của bạn</div>
      <div class="empty-sub">Nhắn tin tự nhiên để ghi lại chi tiêu,<br>truy vấn lịch sử hoặc xem số dư ví.</div>
      <div class="suggestions">
        <button class="sug-btn" onclick="quickSend('mua cà phê 35k tiền mặt')">☕ mua cà phê 35k tiền mặt</button>
        <button class="sug-btn" onclick="quickSend('đổ xăng 100k tiền mặt')">⛽ đổ xăng 100k tiền mặt</button>
        <button class="sug-btn" onclick="quickSend('nhận lương 8tr MB Bank')">💵 nhận lương 8tr MB Bank</button>
        <button class="sug-btn" onclick="quickSend('chuyển 500k tiền mặt sang Momo')">🔄 chuyển 500k tiền mặt sang Momo</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea
      class="input-box"
      id="input"
      placeholder="mua cà phê 35k tiền mặt..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<div id="walletModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.7); align-items:center; justify-content:center; backdrop-filter: blur(4px);">
  <div style="background:#13131a; padding:20px; border-radius:18px; width:90%; max-width:360px; box-shadow:0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(124,106,255,0.2); font-family:sans-serif; color: #f0eeff;">
    <h3 style="margin-top:0; border-bottom:1px solid rgba(124,106,255,0.15); padding-bottom:12px; display:flex; justify-content:space-between; align-items:center; font-size:16px;">
      <span>⚙️ Cài đặt Ẩn/Hiện Ví</span>
      <span onclick="document.getElementById('walletModal').style.display='none'" style="cursor:pointer; font-size:24px; color:#5c5a78; line-height: 1;">&times;</span>
    </h3>
    <div id="modalWalletList" style="max-height:280px; overflow-y:auto; margin-bottom:15px; padding-right: 5px;">
      </div>
    <button onclick="document.getElementById('walletModal').style.display='none'" style="width:100%; padding:12px; background:linear-gradient(135deg, #7c6aff, #b06aff); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size: 14px; box-shadow: 0 4px 15px rgba(124,106,255,0.3);">Xong</button>
  </div>
</div>

<script>
  // ⚠️ THAY LINK NÀY BẰNG LINK DEPLOY MỚI NHẤT CỦA BẠN (LINK .exec)
  const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxxuRXZMWkNDea4-NjNqLQtGAO3PbJWJ8RZRneS9dV4C1CI3IGTTkFWkVu4opqL9HXG/exec";

  const chat     = document.getElementById("chat");
  const input    = document.getElementById("input");
  const sendBtn  = document.getElementById("sendBtn");
  const emptyState = document.getElementById("emptyState");

  function getTime() {
    return new Date().toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" });
  }

  function addMessage(text, role) {
    if (emptyState) emptyState.style.display = "none";

    const wrap = document.createElement("div");
    wrap.className = `msg-wrap ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = getTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap bot";
    wrap.id = "typing";
    wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  // HÀM CHÍNH: GỬI TIN NHẮN CHAT & KIỂM TRA TÍN HIỆU MỞ POP-UP
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";
    autoResize(input);
    sendBtn.disabled = true;
    showTyping();

    try {
      const url = WEBHOOK_URL + "?message=" + encodeURIComponent(text);
      const res = await fetch(url, { method: "GET" });
      const data = await res.json();
      hideTyping();
      
      // 👉 KIỂM TRA XEM APPS SCRIPT CÓ TRẢ VỀ TÍN HIỆU MỞ MODAL KHÔNG
      if (checkWalletModalResponse(data)) {
        sendBtn.disabled = false;
        input.focus();
        return; // Nếu đúng là lệnh mở cài đặt ví, dừng tại đây và hiển thị Modal
      }

      // Ngược lại nếu là tin nhắn text bình thường thì hiển thị lên khung chat
      addMessage(data.reply || "Có lỗi xảy ra, thử lại nhé!", "bot");
    } catch (err) {
      hideTyping();
      addMessage("Không kết nối được. Kiểm tra mạng và thử lại nhé!", "bot");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // HÀM 1: KIỂM TRA DỮ LIỆU ĐỂ VẼ POP-UP LÊN MÀN HÌNH
  function checkWalletModalResponse(response) {
    if (response && response.type === "modal") {
      // Bật khung pop-up đè lên giao diện chính
      document.getElementById('walletModal').style.display = 'flex';
      
      const listDiv = document.getElementById('modalWalletList');
      listDiv.innerHTML = ''; // Xóa sạch danh sách cũ
      
      // Quét qua danh sách các ví được trả về để vẽ công tắc gạt
      response.wallets.forEach(wallet => {
        const isChecked = wallet.status === 'có' ? 'checked' : '';
        const row = document.createElement('div');
        row.className = 'wallet-row';
        row.innerHTML = `
          <span style="font-weight:500; color:#f0eeff; font-size:14px;">${wallet.name}</span>
          <label class="switch">
            <input type="checkbox" ${isChecked} onchange="toggleWalletVisibilityGitHub('${wallet.name}', this.checked)">
            <span class="slider"></span>
          </label>
        `;
        listDiv.appendChild(row);
      });
      return true; // Xác nhận đã xử lý mở modal thành công
    }
    return false; // Dữ liệu text thông thường
  }

  // HÀM 2: GỬI LỆNH GẠT CÔNG TẮC NGẦM VỀ CHO GOOGLE SHEET QUA PHƯƠNG THỨC POST
  function toggleWalletVisibilityGitHub(walletName, isChecked) {
    const statusText = isChecked ? "Có" : "Không";
    
    // Gửi yêu cầu POST ngầm về để Apps Script xử lý đổi cột G trên Sheet
    fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain" // Giữ text/plain để tránh lỗi CORS Preflight
      },
      body: JSON.stringify({
        action: "update_visibility",
        walletName: walletName,
        statusText: statusText
      })
    })
    .then(res => res.json())
    .then(data => {
      console.log("Đã cập nhật ví " + walletName + " thành: " + statusText);
    })
    .catch(err => console.error("Lỗi cập nhật nút gạt:", err));
  }

  function quickSend(text) {
    input.value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  // Hàm xóa lịch sử trên màn hình
  function clearChat() {
    if (!confirm("Xóa lịch sử chat? (Dữ liệu trong Sheets vẫn giữ nguyên)")) return;
    const msgs = chat.querySelectorAll(".msg-wrap, .date-divider");
    msgs.forEach(m => m.remove());
    if (emptyState) emptyState.style.display = "flex";
  }
</script>
</body>
</html>
